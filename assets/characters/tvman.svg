<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260" role="img" aria-label="TV맨">
  <defs>
    <linearGradient id="tv-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f47"/><stop offset="1" stop-color="#22262c"/>
    </linearGradient>
    <linearGradient id="tv-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa0ff"/><stop offset="1" stop-color="#5c7cfa"/>
    </linearGradient>
  </defs>

  <!-- legs -->
  <rect x="72" y="212" width="22" height="42" rx="4" fill="#1c1f25"/>
  <rect x="106" y="212" width="22" height="42" rx="4" fill="#1c1f25"/>

  <!-- suit jacket -->
  <path d="M60 150 h80 v56 a10 10 0 0 1 -10 10 H70 a10 10 0 0 1 -10 -10 Z" fill="#f4f6fa"/>
  <path d="M60 150 h80 v56 a10 10 0 0 1 -10 10 H70 a10 10 0 0 1 -10 -10 Z" fill="none" stroke="#c9d0da" stroke-width="2"/>
  <path d="M92 150 L100 176 L108 150 Z" fill="#e7ebf1" stroke="#c9d0da" stroke-width="1.5"/>
  <path d="M78 150 L100 176 L78 172 Z" fill="#ffffff"/>
  <path d="M122 150 L100 176 L122 172 Z" fill="#ffffff"/>
  <path d="M100 168 l6 8 -6 30 -6 -30 Z" fill="#e23b3b" stroke="#b52b2b" stroke-width="1.5"/>
  <path d="M96 166 l4 4 4 -4 -4 -3 Z" fill="#e23b3b" stroke="#b52b2b" stroke-width="1"/>

  <!-- arms -->
  <rect x="42" y="150" width="20" height="52" rx="8" fill="#f0f3f8" stroke="#c9d0da" stroke-width="2"/>
  <rect x="138" y="150" width="20" height="52" rx="8" fill="#f0f3f8" stroke="#c9d0da" stroke-width="2"/>

  <!-- neck -->
  <rect x="90" y="140" width="20" height="14" fill="#2c3037"/>

  <!-- antennae -->
  <line x1="80" y1="34" x2="66" y2="14" stroke="#2a2e34" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="34" x2="134" y2="14" stroke="#2a2e34" stroke-width="4" stroke-linecap="round"/>
  <circle cx="66" cy="14" r="4" fill="#8b929c"/>
  <circle cx="134" cy="14" r="4" fill="#8b929c"/>

  <!-- TV head -->
  <rect x="48" y="34" width="104" height="106" rx="12" fill="url(#tv-head)" stroke="#14171b" stroke-width="3"/>
  <!-- screen -->
  <rect x="58" y="46" width="70" height="82" rx="8" fill="url(#tv-screen)" stroke="#14171b" stroke-width="2.5"/>
  <!-- smiley face on screen -->
  <circle cx="80" cy="76" r="5" fill="#ffffff"/>
  <circle cx="106" cy="76" r="5" fill="#ffffff"/>
  <path d="M78 96 Q93 110 108 96" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- side control panel -->
  <circle cx="140" cy="60" r="5" fill="#8b929c" stroke="#14171b" stroke-width="1.5"/>
  <circle cx="140" cy="78" r="5" fill="#8b929c" stroke="#14171b" stroke-width="1.5"/>
  <rect x="135" y="94" width="10" height="26" rx="3" fill="#2a2e34" stroke="#14171b" stroke-width="1.5"/>
</svg>
