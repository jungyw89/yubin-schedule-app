<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260" role="img" aria-label="카메라맨">
  <defs>
    <linearGradient id="cm-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f47"/><stop offset="1" stop-color="#22262c"/>
    </linearGradient>
    <radialGradient id="cm-lens" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#6f7681"/><stop offset="0.45" stop-color="#3a4048"/><stop offset="1" stop-color="#101317"/>
    </radialGradient>
  </defs>

  <!-- legs -->
  <rect x="72" y="212" width="22" height="42" rx="4" fill="#1c1f25"/>
  <rect x="106" y="212" width="22" height="42" rx="4" fill="#1c1f25"/>

  <!-- suit jacket -->
  <path d="M60 150 h80 v56 a10 10 0 0 1 -10 10 H70 a10 10 0 0 1 -10 -10 Z" fill="#f4f6fa"/>
  <path d="M60 150 h80 v56 a10 10 0 0 1 -10 10 H70 a10 10 0 0 1 -10 -10 Z" fill="none" stroke="#c9d0da" stroke-width="2"/>
  <path d="M92 150 L100 176 L108 150 Z" fill="#e7ebf1" stroke="#c9d0da" stroke-width="1.5"/>
  <path d="M78 150 L100 176 L78 172 Z" fill="#ffffff"/>
  <path d="M122 150 L100 176 L122 172 Z" fill="#ffffff"/>
  <path d="M100 168 l6 8 -6 30 -6 -30 Z" fill="#e23b3b" stroke="#b52b2b" stroke-width="1.5"/>
  <path d="M96 166 l4 4 4 -4 -4 -3 Z" fill="#e23b3b" stroke="#b52b2b" stroke-width="1"/>

  <!-- arms -->
  <rect x="42" y="150" width="20" height="52" rx="8" fill="#f0f3f8" stroke="#c9d0da" stroke-width="2"/>
  <rect x="138" y="150" width="20" height="52" rx="8" fill="#f0f3f8" stroke="#c9d0da" stroke-width="2"/>

  <!-- neck -->
  <rect x="90" y="140" width="20" height="14" fill="#2c3037"/>

  <!-- camera head -->
  <rect x="52" y="36" width="96" height="104" rx="10" fill="url(#cm-head)" stroke="#14171b" stroke-width="3"/>
  <!-- top viewfinder box -->
  <rect x="60" y="24" width="34" height="16" rx="4" fill="#2a2e34" stroke="#14171b" stroke-width="2"/>
  <!-- red record light -->
  <circle cx="128" cy="52" r="5" fill="#ff4d4d" stroke="#b52b2b" stroke-width="1.5"/>

  <!-- big lens -->
  <circle cx="100" cy="92" r="34" fill="#1a1d22" stroke="#14171b" stroke-width="3"/>
  <circle cx="100" cy="92" r="27" fill="url(#cm-lens)" stroke="#0c0e11" stroke-width="2"/>
  <circle cx="100" cy="92" r="14" fill="#0d0f12"/>
  <circle cx="91" cy="83" r="6" fill="#aeb6c1" opacity="0.85"/>
</svg>
